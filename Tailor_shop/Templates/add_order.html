<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>New Measurement</title>
</head>
<body>
    <div class="form-container">
        <h2>Customer Measurement Form</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Customer Name" required>
            <input type="number" step="0.1" name="neck" placeholder="Neck Size (inches)" required>
            <input type="number" step="0.1" name="waist" placeholder="Waist Size (inches)" required>
            <button type="submit" class="btn">Save Order</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Edit Order #{{ order.id }} | TailorTrack</title>
</head>
<body class="admin-page">
    <header class="site-header">
        <h1>TailorTrack Admin</h1>
        <nav>
            <a href="{{ url_for('admin_orders') }}">Orders</a>
            <a href="{{ url_for('add_order') }}" class="btn">New Order</a>
        </nav>
    </header>

    <main class="edit-page">
        <section class="admin-hero">
            <div>
                <p class="eyebrow">Order #{{ order.id }}</p>
                <h2>Edit order details</h2>
                <p>Update customer contact details, measurements, or the current fitting status.</p>
            </div>
        </section>

        <section class="edit-card">
            <form class="edit-order-form" method="POST">
                <label for="name">Customer Name</label>
                <input id="name" type="text" name="name" value="{{ order.name }}" required>

                <label for="phone">Phone Number</label>
                <input id="phone" type="tel" name="phone" value="{{ order.phone or '' }}" required>

                <label for="email">Email Address</label>
                <input id="email" type="email" name="email" value="{{ order.email or '' }}" required>

                <div class="form-grid">
                    <div>
                        <label for="neck">Neck Size (inches)</label>
                        <input id="neck" type="number" step="0.1" name="neck" value="{{ order.neck }}" required>
                    </div>
                    <div>
                        <label for="waist">Waist Size (inches)</label>
                        <input id="waist" type="number" step="0.1" name="waist" value="{{ order.waist }}" required>
                    </div>
                </div>

                <label for="status">Order Status</label>
                <select id="status" name="status" required>
                    {% for status in statuses %}
                    <option value="{{ status }}" {% if status == order.status %}selected{% endif %}>{{ status }}</option>
                    {% endfor %}
                </select>

                <div class="form-actions">
                    <a href="{{ url_for('admin_orders') }}" class="btn secondary-btn">Cancel</a>
                    <button type="submit" class="btn">Save Changes</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Style and Fit | Dashboard</title>
</head>
<body>
    <header>
        <h1>TailorTrack Dashboard</h1>
        <nav>
            <a href="{{ url_for('index') }}">Dashboard</a>
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('contact') }}">Contact</a>
            <a href="{{ url_for('add_order') }}" class="btn">New Order</a>
        </nav>
    </header>

    <table>
        <thead>
            <tr>
                <th>Customer Name</th>
                <th>Neck (in)</th>
                <th>Waist (in)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order.name }}</td>
                <td>{{ order.neck }}</td>
                <td>{{ order.waist }}</td>
                <td><span class="status {{ order.status.lower().replace(' ', '-') }}">{{ order.status }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ladies Tailoring Order App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Ladies Tailoring Orders</h1>
        <p>Capture customer measurements, stitching details, and delivery timelines.</p>
      </header>

      <section class="card">
        <h2>New Order</h2>
        <form id="orderForm">
          <div class="grid">
            <label>Order ID <input type="text" id="orderId" required /></label>
            <label>Customer Name <input type="text" id="customerName" required /></label>
            <label>Phone Number <input type="tel" id="phone" required /></label>
            <label>Garment Type
              <select id="garmentType" required>
                <option value="">Select</option>
                <option>Blouse</option>
                <option>Kurti</option>
                <option>Salwar Suit</option>
                <option>Lehenga</option>
                <option>Gown</option>
              </select>
            </label>
            <label>Fabric Provided By
              <select id="fabricSource" required>
                <option value="">Select</option>
                <option>Customer</option>
                <option>Tailor</option>
              </select>
            </label>
            <label>Delivery Date <input type="date" id="deliveryDate" required /></label>
          </div>

          <h3>Measurements (inches)</h3>
          <div class="grid">
            <label>Bust <input type="number" id="bust" min="20" max="70" step="0.5" required /></label>
            <label>Waist <input type="number" id="waist" min="20" max="70" step="0.5" required /></label>
            <label>Hip <input type="number" id="hip" min="20" max="80" step="0.5" required /></label>
            <label>Shoulder <input type="number" id="shoulder" min="10" max="30" step="0.5" required /></label>
            <label>Sleeve Length <input type="number" id="sleeveLength" min="0" max="40" step="0.5" required /></label>
            <label>Garment Length <input type="number" id="garmentLength" min="10" max="80" step="0.5" required /></label>
          </div>

          <label>Design Notes
            <textarea id="notes" rows="4" placeholder="Neck design, lining details, embroidery, hooks, etc."></textarea>
          </label>

          <div class="actions">
            <button type="submit">Save Order</button>
            <button type="reset" class="secondary">Clear</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Saved Orders</h2>
          <button id="clearAll" class="danger">Delete All</button>
        </div>
        <input id="search" type="search" placeholder="Search by customer or phone" />
        <div id="ordersList" class="orders"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
